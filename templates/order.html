<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلبات الصيدلي</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="text-center text-primary mb-4">طلباتك</h2>

<table class="table table-bordered text-center">

<thead class="table-dark">
<tr>
<th>#</th>
<th>الدواء</th>
<th>الكمية</th>
<th>العميل</th>
<th>الهاتف</th>
<th>الحالة</th>
<th>تغيير الحالة</th>
</tr>
</thead>

<tbody>

{% for o in orders %}

<tr>

<td>{{ loop.index }}</td>
<td>{{ o.drug_name }}</td>
<td>{{ o.quantity }}</td>
<td>{{ o.customer_name }}</td>
<td>{{ o.customer_phone }}</td>

<td>
<span class="badge
{% if o.status == 'pending' %} bg-warning
{% elif o.status == 'processing' %} bg-primary
{% else %} bg-success
{% endif %}
">
{{ o.status }}
</span>
</td>

<td>

<form method="POST" action="{{ url_for('order') }}">

<input type="hidden" name="index" value="{{ loop.index0 }}">

<select name="status" class="form-select form-select-sm">
<option value="pending">قيد الانتظار</option>
<option value="processing">تم التجهيز</option>
<option value="completed">تم التسليم</option>
</select>

<button class="btn btn-success btn-sm mt-1">
تحديث
</button>

</form>

</td>

</tr>

{% endfor %}

</tbody>
</table>

</div>

</body>
</html>
