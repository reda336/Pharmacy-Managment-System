<!DOCTYPE html>
<html>

<head>

<title>Pharmacy Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="mb-4">📊 Pharmacy Reports Dashboard</h2>

<form class="row mb-4">

<div class="col-md-3">
<input type="date" name="start_date" class="form-control">
</div>

<div class="col-md-3">
<input type="date" name="end_date" class="form-control">
</div>

<div class="col-md-3">
<button class="btn btn-primary">Filter</button>
</div>

</form>

<div class="row text-center">

<div class="col-md-3">

<div class="card shadow">

<div class="card-body">

<h6>Total Orders</h6>

<h3>{{ total_orders }}</h3>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body">

<h6>Today Revenue</h6>

<h3>{{ today_revenue }}</h3>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body">

<h6>Month Revenue</h6>

<h3>{{ month_revenue }}</h3>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow">

<div class="card-body">

<h6>Year Revenue</h6>

<h3>{{ year_revenue }}</h3>

</div>

</div>

</div>

</div>

<br>

<a href="/export_excel" class="btn btn-success mb-4">
⬇ Export Excel
</a>

<hr>

<h4>Daily Revenue</h4>

<canvas id="dailyChart"></canvas>

<hr>

<h4>Monthly Revenue</h4>

<canvas id="monthlyChart"></canvas>

<hr>

<h4>Yearly Revenue</h4>

<canvas id="yearlyChart"></canvas>

<hr>

<h4>Top Selling Drugs</h4>

<canvas id="drugChart"></canvas>

</div>

<script>

new Chart(document.getElementById("dailyChart"),{

type:"bar",

data:{
labels:{{ daily_labels|tojson }},
datasets:[{
label:"Daily Revenue",
data:{{ daily_data|tojson }}
}]
}

})

new Chart(document.getElementById("monthlyChart"),{

type:"line",

data:{
labels:{{ monthly_labels|tojson }},
datasets:[{
label:"Monthly Revenue",
data:{{ monthly_data|tojson }}
}]
}

})

new Chart(document.getElementById("yearlyChart"),{

type:"line",

data:{
labels:{{ yearly_labels|tojson }},
datasets:[{
label:"Yearly Revenue",
data:{{ yearly_data|tojson }}
}]
}

})

new Chart(document.getElementById("drugChart"),{

type:"bar",

data:{
labels:{{ drug_labels|tojson }},
datasets:[{
label:"Top Selling Drugs",
data:{{ drug_data|tojson }}
}]
}

})

</script>

</body>
</html>
