

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل مستخدم جديد</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">

<h3 class="text-center mb-4">📝 تسجيل مستخدم جديد</h3>

{% with messages = get_flashed_messages(with_categories=true) %}
{% for category, message in messages %}
<div class="alert alert-{{ category }}">{{ message }}</div>
{% endfor %}
{% endwith %}

<form method="POST">

<div class="mb-3">
<input type="text" name="name" class="form-control" placeholder="الاسم" required>
</div>

<div class="mb-3">
<input type="text" name="phone" class="form-control" placeholder="رقم الهاتف" required>
</div>

<div class="mb-3">
<input type="password" name="password" class="form-control" placeholder="كلمة المرور" required>
</div>

<div class="mb-3">
<input type="password" name="password2" class="form-control" placeholder="تأكيد كلمة المرور" required>
</div>

<button class="btn btn-success w-100">تسجيل</button>

<p class="mt-3 text-center">
لديك حساب بالفعل؟ <a href="{{ url_for('login_user') }}">تسجيل الدخول</a>
</p>

</form>

</div>
</body>
</html>
