<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تحديث موقع الصيدلية</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f5f7fb; }
.container { max-width:500px; margin-top:50px; }
</style>
</head>
<body>

<div class="container">
  <div class="card p-4 shadow">
    <h4 class="mb-3 text-center">📍 تحديث موقع الصيدلية: {{ pharmacy.name }}</h4>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <input type="text" name="latitude" placeholder="خط العرض (Latitude)" class="form-control mb-2" required>
      <input type="text" name="longitude" placeholder="خط الطول (Longitude)" class="form-control mb-2" required>
      <button class="btn btn-success w-100">تحديث الموقع</button>
    </form>

    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary w-100 mt-2">رجوع</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
