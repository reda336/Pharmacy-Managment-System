<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تسجيل صيدلية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4 text-center">تسجيل صيدلية جديدة</h2>

    <form method="POST" action="{{ url_for('register_pharmacist') }}">
        <!-- البريد الإلكتروني / الرابط -->
        <div class="mb-3">
            <label for="email" class="form-label">البريد الإلكتروني للصيدلية أو الرابط</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="example@pharmacy.com" required>
        </div>

        <!-- اسم الصيدلية -->
        <div class="mb-3">
            <label for="pharmacy_name" class="form-label">اسم الصيدلية</label>
            <input type="text" class="form-control" id="pharmacy_name" name="pharmacy_name" placeholder="أدخل اسم الصيدلية" required>
        </div>

        <!-- العنوان -->
        <div class="mb-3">
            <label for="address" class="form-label">العنوان</label>
            <input type="text" class="form-control" id="address" name="address" placeholder="أدخل عنوان الصيدلية" required>
        </div>

        <!-- زر طلب الاعتماد -->
        <button type="submit" class="btn btn-primary w-100">إرسال طلب الاعتماد</button>
    </form>

    <!-- رابط للعودة لصفحة الرئيسية -->
    <div class="mt-3 text-center">
        <a href="{{ url_for('login') }}">تسجيل دخول</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
