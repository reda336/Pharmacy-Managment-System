<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>طلبات التوفير</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success shadow mb-4">
<div class="container">

<span class="navbar-brand fw-bold">
📦 طلبات توفير الدواء
</span>

<div>

<a href="{{ url_for('pharmacist') }}"
class="btn btn-warning">
🚪 عوده
</a>


<a href="{{ url_for('logout') }}"
class="btn btn-light">
🚪 خروج
</a>

</div>

</div>
</nav>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="alert alert-success text-center">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}


<table class="table table-bordered text-center bg-white shadow">

<thead class="table-dark">
<tr>
<th>اسم الدواء</th>
<th>رقم الهاتف</th>
<th>السعر المقترح</th>
<th>توفير</th>
</tr>
</thead>

<tbody>

{% for r in requests %}

<tr>
<td>{{ r.drug_name }}</td>
<td>{{ r.phone }}</td>

<td>
<form method="POST" action="{{ url_for('provide_supply') }}">

<input type="hidden" name="request_id" value="{{ r.id }}">

<input type="text"
name="price"
class="form-control mb-2"
placeholder="ادخل السعر">

<button class="btn btn-success btn-sm w-100">
✔ توفير الدواء
</button>

</form>
</td>

<td>
<span class="badge bg-info">
{{ r.status }}
</span>
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
